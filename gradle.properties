# Heap raised from 2 GB → 4 GB after a Kotlin daemon crash during
# assembleRelease (release-side R8 + lint + dex builder running together).
# MaxMetaspaceSize keeps long-running daemons from leaking class loaders.
org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.configuration-cache=true

# Give the Kotlin compile daemon its own headroom so it doesn't fight
# Gradle's heap during release variant compilation.
kotlin.daemon.jvm.options=-Xmx2g

android.useAndroidX=true
android.nonTransitiveRClass=true

kotlin.code.style=official
